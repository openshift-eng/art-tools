apiVersion: v1
kind: ServiceAccount
metadata:
  name: rpm-lockfile-image-puller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rpm-lockfile-image-puller-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:image-puller
subjects:
  - kind: ServiceAccount
    name: rpm-lockfile-image-puller
    namespace: art-cd
