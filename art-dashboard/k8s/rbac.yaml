apiVersion: v1
kind: ServiceAccount
metadata:
  name: art-dashboard
  namespace: art-cd
  labels:
    app: art-dashboard
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: art-dashboard-reader
  namespace: art-cd
  labels:
    app: art-dashboard
rules:
  - apiGroups: ["tekton.dev"]
    resources: ["pipelineruns"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: art-dashboard-reader
  namespace: art-cd
  labels:
    app: art-dashboard
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: art-dashboard-reader
subjects:
  - kind: ServiceAccount
    name: art-dashboard
    namespace: art-cd
